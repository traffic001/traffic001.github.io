<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn for Your Opinion | Fast Rewards</title>
    <style>
        :root {
            --primary: #00c853; /* Vibrant green for trust/money */
            --primary-hover: #00a441;
            --dark: #2c3e50;
            --light-bg: #f8fafc;
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card { 
            background: white; 
            padding: 3rem; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
            max-width: 500px; 
            width: 90%;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .badge {
            background: #e8f5e9;
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        h1 { color: var(--dark); font-size: 2.2rem; margin: 0 0 1rem; line-height: 1.2; }
        p { color: #64748b; font-size: 1.1rem; line-height: 1.6; margin-bottom: 2.5rem; }

        .cta-button { 
            display: block; 
            background-color: var(--primary); 
            color: white; 
            padding: 20px; 
            font-size: 1.25rem; 
            font-weight: 700; 
            text-decoration: none; 
            border-radius: 12px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(0, 200, 83, 0.2);
        }

        .cta-button:hover { 
            background-color: var(--primary-hover); 
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 200, 83, 0.3);
        }

        .footer-note { font-size: 0.85rem; color: #94a3b8; margin-top: 2rem; }
    </style>
</head>
<body>

    <div class="card">
        <span class="badge">Limited Spots Available</span>
        <h1>Turn Your Opinions Into Instant Cash</h1>
        <p>Join thousands of people who get paid daily just for sharing their thoughts on new brands.</p>
        
        <a href="https://singingfiles.com/show.php?l=0&u=2510905&id=74402" class="cta-button">
            Start Earning Now &rarr;
        </a>

        <div class="footer-note">
            No experience required. Free to join.
        </div>
    </div>

</body>
</html>
